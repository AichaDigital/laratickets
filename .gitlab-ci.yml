# CI de aichadigital/laratickets en GitLab self-hosted (ADE-295 — Fase 3).
# Traducción de .github/workflows/{run-tests,phpstan,code-coverage,
# fix-php-code-style-issues}.yml.
# Runner: aichadigital-runner01 (VM 891 en prohe03), tags [aichadigital, docker].
# El runner es opt-in (run_untagged=false): sin estos tags no se ejecuta nada.
#
# ── CAMBIO DE COMPORTAMIENTO DELIBERADO: el estilo ahora FALLA, no se arregla ──
#
# En GitHub, `fix-php-code-style-issues.yml` no comprobaba el estilo: ejecutaba
# Pint en modo escritura y COMMITEABA las correcciones a la rama. Ese patrón no
# se puede replicar aquí, y no por una limitación técnica:
#
#   1. GitHub es ahora un espejo de solo lectura; un commit nacido allí lo pisa
#      el siguiente sync del mirror.
#   2. Un job que escribe en la rama que está probando convierte el CI en autor
#      del repositorio — con credenciales de escritura permanentes en el runner.
#
# Se sustituye por `pint --test`, que verifica sin tocar nada. La garantía de
# fondo (main siempre formateado) se conserva; lo que cambia es quién arregla:
# antes el CI en silencio, ahora quien abre la MR. Es una regresión de comodidad
# y una mejora de trazabilidad, y queda escrita para que nadie la lea como olvido.
#
# NO traducido: los filtros `paths:` de GitHub (optimización de coste, no gate) y
# `update-changelog.yml` (se disparaba en release de GitHub; con Actions apagado y
# los releases naciendo en GitLab, esa automatización deja de existir — decisión
# pendiente en ADE-295, no se sustituye en silencio).

stages:
  - quality
  - test

default:
  tags:
    - aichadigital
    - docker
  # Equivalente a `concurrency: cancel-in-progress: true` de GitHub.
  interruptible: true
  # GitHub fijaba timeout-minutes: 10. Se conserva la red de seguridad pero
  # holgada: aquí el runner resuelve dependencias sin la caché de Actions, así
  # que 10 min serían un falso negativo por lentitud, no por cuelgue.
  timeout: 20 minutes

variables:
  COMPOSER_CACHE_DIR: "$CI_PROJECT_DIR/.composer-cache"
  COMPOSER_ALLOW_SUPERUSER: "1"
  COMPOSER_PROCESS_TIMEOUT: "0"
  GIT_DEPTH: "20"

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Paquete: sin composer.lock versionado → `composer update`, como en GitHub.
.php:
  before_script:
    - php -v | head -1
    - composer update --prefer-stable --prefer-dist --no-interaction --no-progress
  cache:
    key: "composer-php${PHP_VERSION}-l${LARAVEL}"
    paths:
      - .composer-cache/

# --- Stage: quality -----------------------------------------------------------

manifest:
  stage: quality
  image: aichadigital/laravel-ci:8.3
  script:
    - composer validate --strict --no-interaction

pint:
  stage: quality
  image: aichadigital/laravel-ci:8.3
  variables:
    PHP_VERSION: "8.3"
  extends: .php
  script:
    # NO `composer lint` ni `composer format`: ambos apuntan a `vendor/bin/pint`
    # en modo escritura. En CI eso no falla — reformatea, deja el árbol sucio y
    # reporta éxito.
    - ./vendor/bin/pint --test

phpstan:
  stage: quality
  image: aichadigital/laravel-ci:8.3
  variables:
    PHP_VERSION: "8.3"
  extends: .php
  script:
    # El workflow usaba `--error-format=github`, que aquí produciría anotaciones
    # que nadie lee. Se usa el script del repo, con el formato por defecto.
    - composer phpstan

# --- Stage: test --------------------------------------------------------------

pest:
  stage: test
  image: aichadigital/laravel-ci:$PHP_VERSION
  parallel:
    matrix:
      - PHP_VERSION: ["8.3", "8.4"]
        LARAVEL: "12.*"
        TESTBENCH: "10.*"
      - PHP_VERSION: ["8.3", "8.4"]
        LARAVEL: "13.*"
        TESTBENCH: "11.*"
  cache:
    key: "composer-php${PHP_VERSION}-l${LARAVEL}"
    paths:
      - .composer-cache/
  before_script:
    - php -v | head -1
    - composer require "laravel/framework:${LARAVEL}" "orchestra/testbench:${TESTBENCH}" --no-interaction --no-update
    - composer update --prefer-stable --prefer-dist --no-interaction --no-progress
    - composer show -D
  script:
    - ./vendor/bin/pest --ci

# Cobertura: el workflow la subía a Codecov con `fail_ci_if_error: false`, es
# decir, medía sin bloquear. Se sustituye por la cobertura NATIVA de GitLab —una
# dependencia externa menos, que es el motivo de ADE-291— conservando que NO sea
# un gate: no había mínimo y no se inventa uno.
#
# PCOV viaja deshabilitado en la imagen compartida (el workflow usaba Xdebug);
# este job opta por él y ASIERTA que cargó: un informe de cobertura sin driver no
# falla, mide cero y reporta éxito.
coverage:
  stage: test
  image: aichadigital/laravel-ci:8.3
  variables:
    PHP_VERSION: "8.3"
  extends: .php
  script:
    - echo 'pcov.enabled=1' > /usr/local/etc/php/conf.d/zz-pcov-on.ini
    - |
      if ! php -r 'exit(ini_get("pcov.enabled") ? 0 : 1);'; then
        echo "PCOV no se activó — la cobertura mediría cero y reportaría éxito"
        exit 1
      fi
    - composer test:coverage -- --coverage-clover=coverage.xml
  # Sin ancla `^`: Pest emite "<ESC>[1mTotal: NN.N %<ESC>[22m" y un `^\s*Total:`
  # no casa más allá del escape — GitLab registraría cobertura vacía con el job
  # en verde (lección de lara-content, 2026-07-22).
  coverage: '/Total:\s*(\d+\.\d+)\s*%/'
  artifacts:
    when: always
    paths:
      - coverage.xml
    expire_in: 1 week

# Integración contra MySQL real. Dos trampas, ambas silenciosas:
#
#   1. GitHub publica los servicios en 127.0.0.1; GitLab los expone como
#      contenedor vecino bajo un ALIAS de red.
#   2. El TestCase documenta explícitamente sus «skip semantics»: si falta
#      cualquier LARATICKETS_TEST_MYSQL_*, hace markTestSkipped() y «the suite
#      stays green». Apuntar mal el host no da error de conexión: da un job
#      VERDE que no ha ejecutado una sola aserción.
#
# De ahí la aserción final: sin ella, este job no prueba que MySQL funcione,
# prueba que el fichero YAML es sintácticamente válido.
mysql-integration:
  stage: test
  image: aichadigital/laravel-ci:8.3
  services:
    - name: mysql:8.4
      alias: mysql
  variables:
    PHP_VERSION: "8.3"
    LARAVEL: "12.*"
    MYSQL_ROOT_PASSWORD: root
    MYSQL_DATABASE: laratickets_test
    LARATICKETS_TEST_MYSQL_HOST: mysql
    LARATICKETS_TEST_MYSQL_PORT: "3306"
    LARATICKETS_TEST_MYSQL_DATABASE: laratickets_test
    LARATICKETS_TEST_MYSQL_USERNAME: root
    LARATICKETS_TEST_MYSQL_PASSWORD: root
  before_script:
    - php -v | head -1
    - composer require "laravel/framework:12.*" "orchestra/testbench:10.*" --no-interaction --no-update
    - composer update --prefer-stable --prefer-dist --no-interaction --no-progress
  script:
    # Espera con PDO (la imagen trae pdo_mysql). No se usa mysqladmin: la imagen
    # lleva cliente MariaDB y ese nombre no está garantizado.
    - |
      for i in $(seq 1 60); do
        php -r 'try { new PDO("mysql:host=".getenv("LARATICKETS_TEST_MYSQL_HOST").";port=".getenv("LARATICKETS_TEST_MYSQL_PORT"), getenv("LARATICKETS_TEST_MYSQL_USERNAME"), getenv("LARATICKETS_TEST_MYSQL_PASSWORD")); exit(0); } catch (Throwable $e) { exit(1); }' && break
        sleep 2
      done
    - |
      if ! php -r 'try { new PDO("mysql:host=".getenv("LARATICKETS_TEST_MYSQL_HOST").";port=".getenv("LARATICKETS_TEST_MYSQL_PORT"), getenv("LARATICKETS_TEST_MYSQL_USERNAME"), getenv("LARATICKETS_TEST_MYSQL_PASSWORD")); exit(0); } catch (Throwable $e) { exit(1); }'; then
        echo "MySQL no respondió en 120 s"
        exit 1
      fi
    - |
      set -o pipefail
      ./vendor/bin/pest tests/Integration/Mysql/ --ci 2>&1 | tee /tmp/mysql-pest.log
    - |
      if grep -qiE '[0-9]+ skipped' /tmp/mysql-pest.log; then
        echo "Los tests de integración MySQL se SALTARON: el TestCase no vio entorno utilizable."
        echo "Un job verde aquí no probaría nada — revisar LARATICKETS_TEST_MYSQL_*."
        exit 1
      fi
      if ! grep -qE 'Tests:.*[0-9]+ passed' /tmp/mysql-pest.log; then
        echo "No se registró ningún test pasado en la suite de integración MySQL."
        exit 1
      fi
